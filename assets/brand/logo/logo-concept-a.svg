<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Finplaza logo">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111A2E"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1FE08F"/>
      <stop offset="1" stop-color="#16C784"/>
    </linearGradient>
    <clipPath id="round">
      <rect x="0" y="0" width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#round)">
    <rect x="0" y="0" width="512" height="512" fill="url(#bgGrad)"/>
    <!-- subtle accent baseline bar -->
    <rect x="64" y="372" width="384" height="8" rx="4" fill="#16C784"/>
    <rect x="64" y="372" width="120" height="8" rx="4" fill="#1FE08F"/>
  </g>

  <!-- Wordmark -->
  <g>
    <!-- Line 1: FIN (green) + PLAZA (off-white), heavy display -->
    <text x="256" y="240"
          font-family="Anton, Impact, sans-serif"
          font-size="118"
          letter-spacing="2"
          text-anchor="middle"
          fill="#F4F7FB">
      <tspan fill="#16C784">FIN</tspan><tspan fill="#F4F7FB">PLAZA</tspan>
    </text>

    <!-- Tagline / handle -->
    <text x="256" y="320"
          font-family="Inter, system-ui, sans-serif"
          font-size="30"
          font-weight="700"
          letter-spacing="8"
          text-anchor="middle"
          fill="#9AA7BD">@FINPLAZA</text>
  </g>

  <!-- Rupee coin replacing the dot of the 'i' in FIN -->
  <!-- Positioned above the 'I' stroke -->
  <g transform="translate(159,118)">
    <circle r="34" fill="url(#coinGrad)"/>
    <circle r="34" fill="none" stroke="#0B1220" stroke-width="4"/>
    <circle r="26" fill="none" stroke="#0B1220" stroke-width="3" stroke-dasharray="3 5" opacity="0.55"/>
    <!-- Rupee symbol -->
    <text x="0" y="15"
          font-family="Inter, system-ui, sans-serif"
          font-size="42"
          font-weight="800"
          text-anchor="middle"
          fill="#0B1220">&#8377;</text>
  </g>
</svg>
