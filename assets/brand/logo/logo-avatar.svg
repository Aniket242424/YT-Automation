<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Finplaza avatar">
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111A2E"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1FE08F"/>
      <stop offset="1" stop-color="#16C784"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed navy so YouTube's circular crop shows a clean navy disc -->
  <rect x="0" y="0" width="512" height="512" fill="url(#navy)"/>

  <!-- subtle ring kept inside the circle-crop safe radius (~236px) -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="#16C784" stroke-opacity="0.22" stroke-width="6"/>

  <!-- Fp monogram, centered, padded off the edges so the round crop never clips it -->
  <text x="256" y="346" font-family="Anton, Impact, sans-serif" font-size="250"
        letter-spacing="-14" text-anchor="middle" fill="url(#green)">Fp</text>

  <!-- gold accent bar (warn colour) for a touch of brand pop -->
  <rect x="196" y="384" width="120" height="14" rx="7" fill="#F6C544"/>
</svg>
