<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Finplaza logo">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111A2E"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16C784"/>
      <stop offset="1" stop-color="#1FE08F"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16C784"/>
      <stop offset="1" stop-color="#1FE08F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="64" fill="url(#bgGrad)"/>

  <!-- ===================== MONOGRAM ICON ===================== -->
  <!-- App-style rounded square -->
  <g>
    <rect x="48" y="120" width="272" height="272" rx="60" fill="#0B1220" stroke="#16C784" stroke-width="5"/>
    <rect x="48" y="120" width="272" height="272" rx="60" fill="#111A2E" opacity="0.6"/>

    <!-- subtle inner accent corner glow bar -->
    <rect x="48" y="120" width="272" height="14" rx="7" fill="url(#accentBar)" opacity="0.85"/>

    <!-- Monogram "Fp" — Anton heavy condensed -->
    <text x="184" y="320" font-family="Anton, Impact, sans-serif" font-size="200"
          fill="url(#iconGrad)" text-anchor="middle" letter-spacing="-6">Fp</text>

    <!-- Rupee stroke accent: extra horizontal bar crossing the F stem -->
    <rect x="92" y="270" width="58" height="14" rx="6" fill="#F6C544"/>
  </g>

  <!-- ===================== WORDMARK LOCKUP ===================== -->
  <g>
    <!-- "Finplaza" two-tone -->
    <text x="350" y="262" font-family="Anton, Impact, sans-serif" font-size="74"
          fill="#F4F7FB" letter-spacing="0.5">
      <tspan fill="#16C784">Fin</tspan><tspan fill="#F4F7FB">plaza</tspan>
    </text>

    <!-- accent underline -->
    <rect x="352" y="278" width="124" height="8" rx="4" fill="url(#accentBar)"/>

    <!-- handle / tagline -->
    <text x="352" y="312" font-family="Inter, system-ui, sans-serif" font-size="22"
          fill="#9AA7BD" letter-spacing="2">@finplaza</text>
    <text x="352" y="342" font-family="Inter, system-ui, sans-serif" font-size="17"
          fill="#F4F7FB" letter-spacing="0.5">Cards · Banking · Money news</text>
  </g>
</svg>
