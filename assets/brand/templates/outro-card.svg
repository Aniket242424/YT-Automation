<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111A2E"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16C784"/>
      <stop offset="1" stop-color="#1FE08F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Decorative ambient glows -->
  <circle cx="240" cy="180" r="220" fill="#16C784" opacity="0.10" filter="url(#soft)"/>
  <circle cx="1700" cy="980" r="260" fill="#1FE08F" opacity="0.08" filter="url(#soft)"/>

  <!-- ===================== SAFE MARGIN GUIDES ===================== -->
  <!-- YouTube end-screen safe area: keep critical content within these bounds.
       Outer dashed frame = ~5% action-safe margin (96px / 54px) -->
  <rect x="96" y="54" width="1728" height="972" fill="none" stroke="#9AA7BD" stroke-width="2" stroke-dasharray="10 10" opacity="0.55"/>
  <text x="108" y="44" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#9AA7BD" letter-spacing="2">SAFE MARGIN — KEEP TEXT &amp; CTAs INSIDE THIS FRAME (≈5%)</text>

  <!-- Inner title-safe guide (~10%) -->
  <rect x="192" y="108" width="1536" height="864" fill="none" stroke="#9AA7BD" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.30"/>

  <!-- ===================== LEFT: CTA BLOCK ===================== -->

  <!-- Accent kicker pill -->
  <g>
    <rect x="160" y="200" width="360" height="64" rx="32" fill="#16C784" opacity="0.14"/>
    <circle cx="200" cy="232" r="9" fill="#1FE08F"/>
    <text x="226" y="241" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#1FE08F" letter-spacing="3">FINPLAZA · WEEKLY</text>
  </g>

  <!-- HEADLINE: SUBSCRIBE -->
  <text x="156" y="470" font-family="Anton, Impact, sans-serif" font-size="280" fill="#F4F7FB" letter-spacing="2">SUB</text>
  <text x="156" y="700" font-family="Anton, Impact, sans-serif" font-size="280" fill="url(#greenGrad)" letter-spacing="2">SCRIBE</text>

  <!-- Handle -->
  <text x="164" y="800" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="800" fill="#F4F7FB">@finplaza</text>

  <!-- Sub-line -->
  <text x="164" y="858" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="500" fill="#9AA7BD">for the weekly card breakdown</text>

  <!-- Subscribe button accent bar -->
  <g>
    <rect x="164" y="900" width="380" height="86" rx="14" fill="#16C784"/>
    <text x="354" y="956" font-family="Anton, Impact, sans-serif" font-size="46" fill="#0B1220" text-anchor="middle" letter-spacing="2">SUBSCRIBE</text>
  </g>

  <!-- Niche tags -->
  <g font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#9AA7BD">
    <text x="572" y="956" letter-spacing="1">Credit Cards · Banking · Savings &amp; Deals · RBI News</text>
  </g>

  <!-- Big gold number accent -->
  <text x="164" y="160" font-family="Anton, Impact, sans-serif" font-size="40" fill="#F6C544" letter-spacing="1">NEW BREAKDOWN EVERY WEEK</text>

  <!-- ===================== RIGHT: END-SCREEN PLACEHOLDERS ===================== -->

  <!-- Section label -->
  <text x="1170" y="170" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#9AA7BD" letter-spacing="3">YOUTUBE END-SCREEN ELEMENTS →</text>

  <!-- Video thumbnail 1 (~430x240) -->
  <g>
    <rect x="1280" y="200" width="430" height="240" rx="20" fill="#111A2E" stroke="#16C784" stroke-width="3" stroke-dasharray="14 10"/>
    <polygon points="1470,290 1470,350 1520,320" fill="#16C784" opacity="0.85"/>
    <text x="1495" y="395" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#F4F7FB" text-anchor="middle">VIDEO THUMBNAIL 1</text>
    <text x="1495" y="425" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#9AA7BD" text-anchor="middle">~430 × 240 · latest upload</text>
  </g>

  <!-- Video thumbnail 2 (~430x240) -->
  <g>
    <rect x="1280" y="480" width="430" height="240" rx="20" fill="#111A2E" stroke="#1FE08F" stroke-width="3" stroke-dasharray="14 10"/>
    <polygon points="1470,570 1470,630 1520,600" fill="#1FE08F" opacity="0.85"/>
    <text x="1495" y="675" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#F4F7FB" text-anchor="middle">VIDEO THUMBNAIL 2</text>
    <text x="1495" y="705" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#9AA7BD" text-anchor="middle">~430 × 240 · best for viewer</text>
  </g>

  <!-- Circular Subscribe avatar placeholder -->
  <g>
    <circle cx="1430" cy="870" r="100" fill="#111A2E" stroke="#F6C544" stroke-width="3" stroke-dasharray="12 9"/>
    <text x="1430" y="858" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#F4F7FB" text-anchor="middle">CHANNEL</text>
    <text x="1430" y="884" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#F4F7FB" text-anchor="middle">AVATAR</text>
    <text x="1430" y="908" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#9AA7BD" text-anchor="middle">Subscribe element</text>
  </g>

  <!-- Subscribe pill next to avatar -->
  <g>
    <rect x="1556" y="838" width="200" height="64" rx="32" fill="#16C784"/>
    <text x="1656" y="879" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="900" fill="#0B1220" text-anchor="middle" letter-spacing="1">SUBSCRIBE</text>
  </g>

  <!-- ===================== COMPLIANCE FOOTER ===================== -->
  <line x1="160" y1="1000" x2="1310" y2="1000" stroke="#9AA7BD" stroke-width="1" opacity="0.25"/>
  <text x="160" y="1022" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#FF5C5C">EDUCATIONAL CONTENT ONLY — NOT INVESTMENT ADVICE.</text>
  <text x="160" y="1048" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="500" fill="#9AA7BD">Post-facto news &amp; explainers. No buy/sell/hold or return predictions. Crypto (if shown) carries the ASCI disclaimer.</text>
</svg>
