<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1FE08F"/>
      <stop offset="1" stop-color="#16C784"/>
    </linearGradient>
    <linearGradient id="backGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#111A2E" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0B1220" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Faint dark rounded backing for legibility -->
  <rect x="48" y="908" width="760" height="128" rx="18" fill="url(#backGrad)"/>
  <rect x="48" y="908" width="540" height="128" rx="18" fill="#0B1220" opacity="0.55"/>

  <!-- Money-green rounded vertical accent bar -->
  <rect x="60" y="940" width="10" height="64" rx="5" fill="url(#barGrad)"/>

  <!-- Section title (display font) -->
  <text x="92" y="980"
        font-family="Anton, Impact, sans-serif"
        font-size="58" letter-spacing="1.5"
        fill="#F4F7FB">SECTION TITLE</text>

  <!-- Sub-line (body font) -->
  <text x="94" y="1016"
        font-family="Inter, system-ui, sans-serif"
        font-size="24" font-weight="600" letter-spacing="3"
        fill="#16C784">1 / 3
    <tspan fill="#9AA7BD" letter-spacing="1.5">  •  @finplaza</tspan>
  </text>
</svg>
